<!DOCTYPE html>
<html lang="$if(lang)$$lang$$else$de$endif$">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
</head>
<body>
  <article class="content">
$body$
  </article>
  <div class="export-toolbar">
    <button onclick="window.print()" title="Mehrseitiges PDF (Druckdialog)">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M6 2h8l4 4v12a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 8v6M7 12l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      PDF
    </button>
    <button onclick="exportPNG()" title="Als Bild exportieren">PNG</button>
  </div>
  <style>
    .export-toolbar {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      gap: 0.35rem;
      z-index: 9999;
    }
    .export-toolbar button {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.5rem 0.75rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: background 0.15s;
    }
    .export-toolbar button:hover { background: #333; }
    .export-toolbar button:disabled { opacity: 0.5; cursor: wait; }
    .export-toolbar svg { flex-shrink: 0; }
    @media print { .export-toolbar { display: none !important; } }
  </style>
  <script>
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    async function exportPNG() {
      const btns = document.querySelectorAll('.export-toolbar button');
      btns.forEach(b => b.disabled = true);
      try {
        if (!window.domtoimage) await loadScript('https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.5/dist/dom-to-image-more.min.js');
        const toolbar = document.querySelector('.export-toolbar');
        toolbar.style.display = 'none';
        const content = document.querySelector('.content');
        const scale = 2;
        const rem = parseFloat(getComputedStyle(document.documentElement).fontSize);
        const pad = rem * 2;
        const dataUrl = await domtoimage.toPng(content, {
          width: content.offsetWidth * scale,
          height: (content.offsetHeight + pad * 2) * scale,
          style: {
            transform: 'scale(' + scale + ')',
            transformOrigin: 'top left',
            background: '#fff',
            padding: '2rem 2rem'
          },
          cacheBust: true
        });
        toolbar.style.display = '';
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = (document.title || 'export') + '.png';
        a.click();
      } catch (e) {
        console.error('Export failed:', e);
        alert('Export fehlgeschlagen: ' + e.message);
      } finally {
        btns.forEach(b => b.disabled = false);
      }
    }
  </script>
</body>
</html>
